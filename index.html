<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SVOY VPN PREMIUM</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --card-bg: #111111;
            --accent-color: #c2a379; 
            --text-main: #ffffff;
            --text-gray: #666666;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg-color); color: var(--text-main); margin: 0; font-family: -apple-system, system-ui, sans-serif; overflow: hidden; }

        .page { display: none; padding: 20px; height: 100vh; overflow-y: auto; padding-bottom: 100px; background: var(--bg-color); }
        .page.active { display: block; }

        /* АНИМАЦИЯ НАСЫПАНИЯ (7 СЕКУНД) */
        .logo-stage { height: 250px; display: flex; align-items: center; justify-content: center; }
        .sand-letter {
            fill: none; stroke: var(--accent-color); stroke-width: 14; stroke-linecap: round;
            stroke-dasharray: 1000; stroke-dashoffset: 1000;
            animation: draw 7s ease-in-out forwards, shake 5s infinite ease-in-out;
        }
        @keyframes draw { to { stroke-dashoffset: 0; } }
        @keyframes shake { 0%, 100% { transform: rotate(0deg); } 50% { transform: rotate(1deg); } }

        /* iOS КАРТОЧКИ */
        .ios-card { background: var(--card-bg); border-radius: 18px; border: 1px solid rgba(194, 163, 121, 0.1); margin-bottom: 15px; overflow: hidden; }
        .ios-row { padding: 16px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.03); }

        /* КНОПКИ */
        .btn { background: var(--accent-color); color: #000; border: none; padding: 14px; border-radius: 14px; font-weight: 600; width: 100%; cursor: pointer; transition: 0.2s; }
        .btn-dark { background: #1a1a1a; color: var(--text-main); border: 1px solid rgba(194, 163, 121, 0.2); }

        /* НАВИГАЦИЯ EVO (УЗКАЯ И ДОРОГАЯ) */
        .navigation { 
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); 
            width: 90%; height: 64px; background: rgba(15, 15, 15, 0.9); 
            backdrop-filter: blur(15px); border-radius: 32px; display: flex; 
            justify-content: space-around; align-items: center; border: 1px solid rgba(194, 163, 121, 0.15);
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--text-gray); width: 50px; transition: 0.3s; }
        .nav-item.active { color: var(--accent-color); }
        .nav-item span { font-size: 9px; margin-top: 3px; font-weight: 500; }
        .nav-indicator { position: absolute; width: 42px; height: 42px; background: rgba(194, 163, 121, 0.1); border-radius: 50%; transition: 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28); z-index: -1; }

        /* ПРОФИЛЬ */
        .profile-avatar { width: 70px; height: 70px; border-radius: 50%; border: 2px solid var(--accent-color); margin: 0 auto 10px; overflow: hidden; }
        .accordion-content { display: none; padding: 15px; background: #0d0d0d; }
        .ios-card.open .accordion-content { display: block; }
    </style>
</head>
<body>

    <div id="page-home" class="page active">
        <div class="logo-stage">
            <svg width="300" height="100" viewBox="0 0 240 100">
                <path class="sand-letter" d="M40,30 c-20,0 -20,20 0,20 s20,20 0,20" />
                <path class="sand-letter" d="M75,30 l15,40 l15,-40" />
                <path class="sand-letter" d="M130,50 a15,20 0 1,0 30,0 a15,20 0 1,0 -30,0" />
                <path class="sand-letter" d="M185,30 l15,20 l15,-20 M200,50 l0,20" />
            </svg>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px;">
            <div class="ios-card" style="padding:15px; text-align:center;">
                <div style="font-size: 9px; color: var(--text-gray);">ПОДПИСКА ДО</div>
                <div style="font-size: 13px; font-weight: 600; color: var(--accent-color);">12.06.2026</div>
            </div>
            <div class="ios-card" style="padding:15px; text-align:center;">
                <div style="font-size: 9px; color: var(--text-gray);">УСТРОЙСТВ</div>
                <div style="font-size: 13px; font-weight: 600; color: var(--accent-color);">1 / 3</div>
            </div>
        </div>
        <button class="btn" style="margin-bottom: 10px;">Продлить доступ</button>
        <button class="btn btn-dark">Подключить устройство</button>
    </div>

    <div id="page-subs" class="page">
        <div class="ios-card">
            <div class="ios-row"><span>Статус</span><span style="color: #34C759;">● Активна</span></div>
            <div style="padding: 30px; text-align: center;">
                <div style="font-size: 42px; font-weight: 800; color: var(--accent-color);">23:59:59</div>
                <div style="font-size: 10px; color: var(--text-gray);">ОСТАЛОСЬ ВРЕМЕНИ</div>
            </div>
        </div>
        <div style="display: flex; gap: 10px;">
            <button class="btn">Продлить</button>
            <button class="btn btn-dark">Тарифы</button>
        </div>
    </div>

    <div id="page-balance" class="page">
        <div class="ios-card" style="padding: 20px;">
            <div style="font-size: 10px; color: var(--text-gray);">БАЛАНС</div>
            <div style="font-size: 32px; font-weight: 700; margin: 10px 0;">0.00 ₽</div>
            <div style="display: flex; gap: 10px;">
                <button class="btn" style="padding: 10px; font-size: 12px;">Пополнить</button>
                <button class="btn btn-dark" style="padding: 10px; font-size: 12px;">Промокод</button>
            </div>
        </div>
        <div class="ios-card" style="padding: 20px; text-align: center;">
            <div style="font-size: 10px; color: var(--text-gray);">БАЛАНС НА ВЫВОД</div>
            <div style="font-size: 28px; font-weight: 700; color: var(--accent-color); margin: 10px 0;">0.00 ₽</div>
            <div style="display: flex; gap: 10px;">
                <button class="btn btn-dark">Вывод</button>
                <button class="btn btn-dark">Статистика</button>
            </div>
        </div>
        <div class="ios-card" id="hist-acc">
            <div class="ios-row" onclick="document.getElementById('hist-acc').classList.toggle('open')">
                <span>История операций</span><span style="font-size: 10px;">▼</span>
            </div>
            <div class="accordion-content">Операций нет</div>
        </div>
    </div>

    <div id="page-profile" class="page">
        <div class="profile-avatar" id="user-photo">
            <svg viewBox="0 0 24 24" fill="none" stroke="var(--accent-color)" stroke-width="1.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
        </div>
        <div style="text-align: center; margin-bottom: 20px;">
            <div id="display-name" style="font-size: 20px; font-weight: 700;">Пользователь</div>
            <div id="username-text" style="color: var(--text-gray); font-size: 13px;">@username</div>
        </div>
        <div class="ios-card" id="prof-acc">
            <div class="ios-row" onclick="document.getElementById('prof-acc').classList.toggle('open')">
                <span>Информация об аккаунте</span><span style="font-size: 10px;">▼</span>
            </div>
            <div class="accordion-content">
                <div class="ios-row" style="padding: 8px 0;"><span>ID</span><span id="info-id" style="color: var(--accent-color);">...</span></div>
                <div class="ios-row" style="padding: 8px 0;"><span>Username</span><span id="info-user">...</span></div>
            </div>
        </div>
    </div>

    <div class="navigation">
        <div class="nav-indicator" id="navIndicator"></div>
        <div class="nav-item active" onclick="showPage('home', this, 0)">
            <svg class="nav-icon-svg" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            <span>Главная</span>
        </div>
        <div class="nav-item" onclick="showPage('subs', this, 1)">
            <svg class="nav-icon-svg" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/></svg>
            <span>Подписка</span>
        </div>
        <div class="nav-item" onclick="showPage('balance', this, 2)">
            <svg class="nav-icon-svg" viewBox="0 0 24 24"><path d="M21 18v1c0 1.1-.9 2-2 2H5c-1.1 0-2-.9-2-2V5c0-1.1.9-2 2-2h14c1.1 0 2 .9 2 2v1h-9c-1.1 0-2 .9-2 2v8c0 1.1.9 2 2 2h9z"/></svg>
            <span>Баланс</span>
        </div>
        <div class="nav-item" onclick="showPage('profile', this, 3)">
            <svg class="nav-icon-svg" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
            <span>Профиль</span>
        </div>
        <div class="nav-item" onclick="showPage('game', this, 4)">
            <svg class="nav-icon-svg" viewBox="0 0 24 24"><path d="M21 6H3c-1.1 0-2 .9-2 2v8c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2z"/></svg>
            <span>Игра</span>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        function showPage(pId, el, idx) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('page-' + pId).classList.add('active');
            el.classList.add('active');
            const step = document.querySelector('.navigation').offsetWidth / 5;
            document.getElementById('navIndicator').style.left = (step * idx + (step/2 - 21)) + 'px';
            tg.HapticFeedback.impactOccurred('light');
        }
        window.onload = () => {
            const user = tg.initDataUnsafe?.user;
            if (user) {
                document.getElementById('display-name').innerText = user.first_name;
                document.getElementById('info-id').innerText = user.id;
                document.getElementById('info-user').innerText = user.username ? '@' + user.username : 'нет';
                if (user.photo_url) document.getElementById('user-photo').innerHTML = `<img src="${user.photo_url}" style="width:100%;height:100%;object-fit:cover;">`;
            }
            const step = document.querySelector('.navigation').offsetWidth / 5;
            document.getElementById('navIndicator').style.left = (step/2 - 21) + 'px';
        };
    </script>
</body>
</html>
