<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SVOY VPN PREMIUM</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --card-bg: #141414;
            --accent-color: #c2a379; 
            --sand-light: #d9c5a3;
            --text-main: #e5e5e5;
            --text-gray: #737373;
            --nav-bg: #111111;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0; padding: 0;
            overflow: hidden; user-select: none;
        }

        .page { display: none; padding: 20px; height: calc(100vh - 90px); overflow-y: auto; box-sizing: border-box; }
        .page.active { display: block; }

        /* --- SAND ANIMATION FIX --- */
        .logo-area { 
            height: 180px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            position: relative;
            margin-top: 20px;
        }

        .shovel-svg {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-130px);
            z-index: 100;
            animation: shovelArc 5s forwards cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes shovelArc {
            0% { transform: translate(-160px, -40px) rotate(0deg); opacity: 0; }
            15% { transform: translate(-130px, 10px) rotate(0deg); opacity: 1; }
            25% { transform: translate(-130px, 10px) rotate(-60deg); }
            85% { transform: translate(70px, 10px) rotate(-60deg); opacity: 1; }
            100% { transform: translate(100px, -20px) rotate(-60deg); opacity: 0; }
        }

        .sand-svg-logo {
            width: 260px;
            filter: url(#sand-grain-filter);
        }

        .sand-path {
            fill: none;
            stroke: var(--accent-color);
            stroke-width: 10;
            stroke-linecap: round;
            stroke-linejoin: round;
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            animation: drawLetter 1.5s forwards;
        }

        .s-path { animation-delay: 1.5s; }
        .v-path { animation-delay: 2.2s; }
        .o-path { animation-delay: 2.9s; }
        .y-path { animation-delay: 3.6s; }

        @keyframes drawLetter {
            to { stroke-dashoffset: 0; }
        }

        /* --- BUTTONS POSITION (RESTORED) --- */
        .home-content {
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        .spacer { flex-grow: 1; }

        .bubble-btn {
            width: 100%; padding: 18px; border-radius: 30px; border: none;
            background: linear-gradient(145deg, #1a1a1a, #141414);
            color: var(--text-main); font-weight: 600; font-size: 14px;
            margin-bottom: 15px; cursor: pointer; box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            transition: 0.3s; display: flex; align-items: center; justify-content: center;
        }
        .bubble-btn.primary { background: var(--accent-color); color: #000; }

        /* --- PROFILE & NAV (UNCHANGED) --- */
        .profile-header { display: flex; flex-direction: column; align-items: center; margin-bottom: 30px; }
        .profile-avatar { width: 80px; height: 80px; border-radius: 50%; background: #262626; border: 2px solid var(--accent-color); margin-bottom: 15px; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .profile-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .profile-name { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
        .profile-username { font-size: 14px; color: var(--text-gray); }
        .accordion { background: var(--card-bg); border-radius: 20px; border: 1px solid #262626; overflow: hidden; margin-top: 20px; }
        .accordion-header { padding: 18px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .accordion-arrow { width: 10px; height: 10px; border-right: 2px solid var(--text-gray); border-bottom: 2px solid var(--text-gray); transform: rotate(45deg); transition: 0.3s; }
        .accordion.open .accordion-arrow { transform: rotate(-135deg); }
        .accordion-content { display: none; padding: 0 18px 18px 18px; }
        .accordion.open .accordion-content { display: block; }
        .info-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #262626; }

        .navigation { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; height: 70px; background: var(--nav-bg); border-radius: 35px; display: flex; justify-content: space-around; align-items: center; padding: 0 10px; border: 1px solid rgba(255,255,255,0.05); z-index: 1000; }
        .nav-item { position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 60px; height: 100%; color: var(--text-gray); transition: 0.3s; z-index: 2; }
        .nav-item.active { color: var(--accent-color); }
        .nav-item span { font-size: 9px; margin-top: 4px; }
        .nav-indicator { position: absolute; top: 50%; left: 10px; transform: translateY(-50%); width: 50px; height: 50px; background: rgba(194, 163, 121, 0.1); border-radius: 50%; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 1; }
        .nav-icon-svg { width: 22px; height: 22px; fill: currentColor; }
    </style>
</head>
<body>

    <svg style="display: none;">
        <filter id="sand-grain-filter">
            <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="4" result="noise"/>
            <feDisplacementMap in="SourceGraphic" in2="noise" scale="3" />
        </filter>
    </svg>

    <div id="page-home" class="page active">
        <div class="home-content">
            <div class="logo-area">
                <div class="shovel-svg">
                    <svg width="50" height="50" viewBox="0 0 24 24">
                        <path d="M17 4l-3 3" stroke="#5c4033" stroke-width="2"/>
                        <path d="M14 7l-8 8 3 3 8-8-3-3z" fill="#444"/>
                        <path d="M6 15l-2 5 5-2 8-8-3-3-8 8z" fill="#666"/>
                    </svg>
                </div>
                <svg class="sand-svg-logo" viewBox="0 0 200 80">
                    <path class="sand-path s-path" d="M40,25 c-15,0 -15,15 0,15 s15,15 0,15" />
                    <path class="sand-path v-path" d="M65,25 l12,30 l12,-30" />
                    <path class="sand-path o-path" d="M115,40 a12,15 0 1,0 24,0 a12,15 0 1,0 -24,0" />
                    <path class="sand-path y-path" d="M160,25 l12,15 l12,-15 M172,40 l0,15" />
                </svg>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px;">
                <div style="background: var(--card-bg); padding: 18px; border-radius: 20px; border: 1px solid #262626;">
                    <div style="font-size: 10px; color: var(--text-gray); text-transform: uppercase;">Подписка до</div>
                    <div style="font-size: 14px; font-weight: 600;">12.06.2026</div>
                </div>
                <div style="background: var(--card-bg); padding: 18px; border-radius: 20px; border: 1px solid #262626;">
                    <div style="font-size: 10px; color: var(--text-gray); text-transform: uppercase;">Устройств</div>
                    <div style="font-size: 14px; font-weight: 600;">1 / 3</div>
                </div>
            </div>

            <div class="spacer"></div>

            <button class="bubble-btn primary">Продлить доступ</button>
            <button class="bubble-btn" style="margin-bottom: 80px;">Подключить устройство</button>
        </div>
    </div>

    <div id="page-profile" class="page">
        <div class="profile-header">
            <div class="profile-avatar" id="user-photo">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" style="width: 40px; color: #404040;"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            </div>
            <div class="profile-name" id="display-name">Пользователь</div>
            <div class="profile-username" id="username-text">@username</div>
        </div>
        <div class="accordion" id="infoAccordion">
            <div class="accordion-header" onclick="toggleAccordion()">
                <div class="accordion-title">Информация об аккаунте</div>
                <div class="accordion-arrow"></div>
            </div>
            <div class="accordion-content">
                <div class="info-row"><span class="info-label">Telegram ID</span><span class="info-value" id="info-id">...</span></div>
                <div class="info-row"><span class="info-label">Имя пользователя</span><span class="info-value" id="info-username">...</span></div>
                <div class="info-row"><span class="info-label">Имя</span><span class="info-value" id="info-name">...</span></div>
                <div class="info-row"><span class="info-label">Дата регистрации</span><span class="info-value">29.05.2026</span></div>
            </div>
        </div>
    </div>

    <div id="page-subs" class="page">
        <h2 style="text-align: center; font-weight: 200; letter-spacing: 3px;">ТАРИФЫ</h2>
        <div style="background: var(--card-bg); padding: 18px; border-radius: 20px; border: 1px solid #262626; margin-bottom: 12px; display: flex; justify-content: space-between;">
            <span>1 МЕСЯЦ</span><span style="color: var(--accent-color); font-weight: 700;">220₽</span>
        </div>
    </div>

    <div id="page-balance" class="page">
        <h2 style="text-align: center; font-weight: 200; letter-spacing: 3px;">БАЛАНС</h2>
        <div style="background: var(--card-bg); padding: 50px 0; border-radius: 20px; border: 1px solid #262626; text-align: center;">
            <div style="font-size: 42px; font-weight: 700; color: var(--accent-color);">0.00 ₽</div>
            <div style="font-size: 10px; color: var(--text-gray); text-transform: uppercase;">Доступно к выводу</div>
        </div>
    </div>

    <div id="page-game" class="page">
        <h2 style="text-align: center; font-weight: 200; letter-spacing: 3px;">SVOY GAME</h2>
        <div style="width: 100%; height: 160px; background: #0a0a0a; border-radius: 24px; position: relative; overflow: hidden; border: 1px solid #262626;">
            <div style="position: absolute; bottom: 10px; left: 20px; width: 30px; height: 50px;">
                <div style="width: 14px; height: 14px; background: var(--accent-color); border-radius: 4px; margin: 0 auto;"></div>
                <div style="width: 20px; height: 22px; background: #1a1a1a; border: 1px solid var(--accent-color); border-radius: 4px; margin: 2px auto; display: flex; align-items: center; justify-content: center; font-size: 10px; color: var(--accent-color);">S</div>
            </div>
        </div>
    </div>

    <div class="navigation">
        <div class="nav-indicator" id="navIndicator"></div>
        <div class="nav-item active" onclick="showPage('home', this, 0)">
            <svg class="nav-icon-svg" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            <span>Главная</span>
        </div>
        <div class="nav-item" onclick="showPage('subs', this, 1)">
            <svg class="nav-icon-svg" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
            <span>Подписка</span>
        </div>
        <div class="nav-item" onclick="showPage('balance', this, 2)">
            <svg class="nav-icon-svg" viewBox="0 0 24 24"><path d="M21 18v1c0 1.1-.9 2-2 2H5c-1.1 0-2-.9-2-2V5c0-1.1.9-2 2-2h14c1.1 0 2 .9 2 2v1h-9c-1.1 0-2 .9-2 2v8c0 1.1.9 2 2 2h9zm-9-2h10V8H12v8zm4-2.5c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/></svg>
            <span>Баланс</span>
        </div>
        <div class="nav-item" onclick="showPage('profile', this, 3)">
            <svg class="nav-icon-svg" viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5s-3 1.34-3 3 1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
            <span>Профиль</span>
        </div>
        <div class="nav-item" onclick="showPage('game', this, 4)">
            <svg class="nav-icon-svg" viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-1.99.9-1.99 2L2 22l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-2 12H6v-2h12v2zm0-3H6V9h12v2zm0-3H6V6h12v2z"/></svg>
            <span>Игра</span>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        
        function showPage(pageId, el, index) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('page-' + pageId).classList.add('active');
            el.classList.add('active');
            const indicator = document.getElementById('navIndicator');
            const step = (document.querySelector('.navigation').offsetWidth - 20) / 5;
            indicator.style.left = (10 + (step * index) + (step/2 - 25)) + 'px';
            tg.HapticFeedback.impactOccurred('light');
        }

        function toggleAccordion() {
            document.getElementById('infoAccordion').classList.toggle('open');
            tg.HapticFeedback.impactOccurred('light');
        }

        window.onload = () => {
            const nav = document.querySelector('.navigation');
            const step = (nav.offsetWidth - 20) / 5;
            document.getElementById('navIndicator').style.left = (10 + (step * 0) + (step/2 - 25)) + 'px';
            
            const user = tg.initDataUnsafe?.user;
            if (user) {
                document.getElementById('display-name').innerText = (user.first_name + ' ' + (user.last_name || '')).trim();
                document.getElementById('username-text').innerText = user.username ? '@' + user.username : '';
                document.getElementById('info-id').innerText = user.id;
                document.getElementById('info-username').innerText = user.username ? '@' + user.username : 'нет';
                document.getElementById('info-name').innerText = user.first_name;
                if (user.photo_url) document.getElementById('user-photo').innerHTML = `<img src="${user.photo_url}">`;
            }
        };
        tg.expand();
    </script>
</body>
</html>
