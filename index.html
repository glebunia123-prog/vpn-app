<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SVOY VPN PREMIUM</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #020617;
            --card-bg: #111827;
            --accent-color: #3b82f6;
            --gold-color: #fbbf24;
            --text-main: #f8fafc;
            --text-gray: #94a3b8;
            --lego-yellow: #facc15;
            --cap-color: #d6d3d1;
        }

        body {
            font-family: -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0; padding: 0;
            overflow: hidden; user-select: none;
        }

        .page { display: none; padding: 15px; height: calc(100vh - 85px); overflow-y: auto; box-sizing: border-box; }
        .page.active { display: block; }

        /* --- HOME PAGE (EVO STYLE) --- */
        .home-header { text-align: center; margin-top: 10px; margin-bottom: 30px; }
        .logo-svoy { font-size: 36px; font-weight: 900; letter-spacing: 4px; }
        .logo-svoy span { color: var(--accent-color); }

        .power-container { display: flex; justify-content: center; margin: 30px 0; }
        .power-btn { 
            width: 150px; height: 150px; border-radius: 50%; 
            background: #1f2937; border: 6px solid #111827;
            display: flex; align-items: center; justify-content: center;
            font-size: 50px; color: #4b5563; cursor: pointer; transition: 0.4s;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        }
        .power-btn.active { color: var(--accent-color); border-color: var(--accent-color); box-shadow: 0 0 40px rgba(59, 130, 246, 0.4); }

        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 15px; }
        .info-card { background: var(--card-bg); padding: 15px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.05); }
        .info-label { font-size: 11px; color: var(--text-gray); margin-bottom: 5px; text-transform: uppercase; }
        .info-value { font-size: 15px; font-weight: 700; }

        .traffic-card { background: var(--card-bg); padding: 15px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 15px; }
        .progress-container { height: 6px; background: #1f2937; border-radius: 3px; margin: 10px 0; overflow: hidden; }
        .progress-bar { height: 100%; background: var(--accent-color); width: 45%; border-radius: 3px; }

        .action-btn { 
            width: 100%; padding: 14px; border-radius: 14px; border: none; 
            background: #1f2937; color: white; font-weight: 700; font-size: 14px;
            margin-bottom: 10px; cursor: pointer; transition: 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .action-btn.primary { background: var(--accent-color); }

        /* --- GAME (YOUR ORIGINAL) --- */
        #game-container { width: 100%; height: 150px; background: #020617; border-radius: 20px; position: relative; overflow: hidden; border: 1px solid var(--accent-color); }
        .stars { position: absolute; width: 200%; height: 100%; background-image: radial-gradient(1px 1px at 20px 30px, #fff, rgba(0,0,0,0)), radial-gradient(2px 2px at 50px 80px, #fff, rgba(0,0,0,0)); background-size: 150px 150px; animation: starScroll 20s linear infinite; }
        @keyframes starScroll { from { left: 0; } to { left: -100%; } }
        .lego-figure { position: relative; width: 30px; height: 50px; display: inline-block; }
        .lego-head { position: absolute; top: 5px; left: 7px; width: 14px; height: 14px; background: var(--lego-yellow); border-radius: 5px; z-index: 10; }
        .lego-body { position: absolute; top: 18px; left: 4px; width: 20px; height: 22px; background: #3b82f6; border-radius: 5px; z-index: 5; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 900; }
        .lego-limb { position: absolute; background: #2563eb; border-radius: 4px; }
        .arm { width: 6px; height: 16px; top: 20px; left: 12px; }
        .leg { width: 9px; height: 18px; top: 38px; left: 10px; }
        .running .leg { animation: runCycle 0.4s infinite alternate; }
        @keyframes runCycle { from { transform: rotate(-30deg); } to { transform: rotate(30deg); } }

        /* --- NAV BAR --- */
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: #0f172a; display: flex; padding: 10px 0 25px 0; border-top: 1px solid rgba(255,255,255,0.05); }
        .nav-item { flex: 1; text-align: center; color: #64748b; font-size: 10px; display: flex; flex-direction: column; align-items: center; }
        .nav-item.active { color: var(--accent-color); }
        .nav-icon { font-size: 22px; margin-bottom: 4px; }
    </style>
</head>
<body>

    <!-- ГЛАВНАЯ -->
    <div id="page-home" class="page active">
        <div class="home-header">
            <div class="logo-svoy">SVOY<span>VPN</span></div>
        </div>

        <div class="power-container">
            <div class="power-btn" id="powerBtn" onclick="toggleConnect()">⏻</div>
        </div>

        <div class="info-grid">
            <div class="info-card">
                <div class="info-label">Подписка до</div>
                <div class="info-value">12.06.2026</div>
            </div>
            <div class="info-card">
                <div class="info-label">Устройств</div>
                <div class="info-value">1 / 3</div>
            </div>
        </div>

        <div class="traffic-card">
            <div style="display: flex; justify-content: space-between;">
                <div class="info-label">Трафик</div>
                <div class="info-value" style="font-size: 12px;">4.2 ГБ / ∞</div>
            </div>
            <div class="progress-container">
                <div class="progress-bar"></div>
            </div>
        </div>

        <button class="action-btn primary" onclick="showPage('subs', document.querySelectorAll('.nav-item')[1])">💎 Продлить подписку</button>
        <button class="action-btn">📱 Подключить устройство</button>
    </div>

    <!-- ПОДПИСКА -->
    <div id="page-subs" class="page">
        <h2 style="text-align: center;">Тарифы</h2>
        <div class="info-card" style="margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center;">
            <span>1 Месяц</span><span style="color: var(--accent-color); font-weight: 800;">220₽</span>
        </div>
        <div class="info-card" style="margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border-color: var(--accent-color);">
            <span>3 Месяца</span><span style="color: var(--accent-color); font-weight: 800;">560₽</span>
        </div>
        <div class="info-card" style="margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center;">
            <span>12 Месяцев</span><span style="color: var(--accent-color); font-weight: 800;">1480₽</span>
        </div>
    </div>

    <!-- БАЛАНС -->
    <div id="page-balance" class="page">
        <h2 style="text-align: center;">Баланс</h2>
        <div class="info-card" style="text-align: center; padding: 40px 0;">
            <div style="font-size: 42px; font-weight: 900;">0.00 ₽</div>
            <div class="info-label">Доступно для вывода</div>
        </div>
        <button class="action-btn primary" style="margin-top: 20px;">Вывести средства</button>
    </div>

    <!-- ПРОФИЛЬ -->
    <div id="page-profile" class="page">
        <h2 style="text-align: center;">Профиль</h2>
        <div class="info-card" style="margin-bottom: 15px;">
            <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                <span class="info-label">Ваш ID</span><span id="user-id">...</span>
            </div>
            <div style="display: flex; justify-content: space-between;">
                <span class="info-label">Статус</span><span style="color: #10b981; font-weight: 700;">Active</span>
            </div>
        </div>
    </div>

    <!-- ИГРА -->
    <div id="page-game" class="page">
        <h2 style="text-align: center;">SVOY Game</h2>
        <div id="game-container" onclick="jump()">
            <div class="stars"></div>
            <div id="lego-man-container" style="position: absolute; bottom: 10px; left: 20px;">
                <div id="lego-man-figure" class="lego-figure">
                    <div class="lego-head"></div><div class="lego-body">S</div>
                    <div class="lego-limb leg" style="left: 10px;"></div>
                </div>
            </div>
        </div>
        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 15px;">
            <span style="font-size: 20px; font-weight: 900; color: var(--gold-color);"><span id="game-score">0.00</span> ₽</span>
            <button id="startBtn" onclick="startGame()" class="action-btn primary" style="width: auto; padding: 10px 30px;">PLAY</button>
        </div>
    </div>

    <!-- МЕНЮ -->
    <div class="nav-bar">
        <div class="nav-item active" onclick="showPage('home', this)"><span class="nav-icon">🛡</span>Главная</div>
        <div class="nav-item" onclick="showPage('subs', this)"><span class="nav-icon">💎</span>Подписка</div>
        <div class="nav-item" onclick="showPage('balance', this)"><span class="nav-icon">💰</span>Баланс</div>
        <div class="nav-item" onclick="showPage('profile', this)"><span class="nav-icon">👤</span>Профиль</div>
        <div class="nav-item" onclick="showPage('game', this)"><span class="nav-icon">🎮</span>Игра</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        
        function showPage(pageId, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('page-' + pageId).classList.add('active');
            el.classList.add('active');
            tg.HapticFeedback.impactOccurred('light');
        }

        function toggleConnect() {
            const btn = document.getElementById('powerBtn');
            btn.classList.toggle('active');
            tg.HapticFeedback.notificationOccurred(btn.classList.contains('active') ? 'success' : 'warning');
        }

        document.getElementById('user-id').innerText = tg.initDataUnsafe?.user?.id || "12345678";

        // GAME LOGIC (MINIMAL)
        let isJumping = false;
        function jump() {
            if(isJumping) return;
            isJumping = true;
            const man = document.getElementById('lego-man-container');
            man.style.transition = "bottom 0.3s";
            man.style.bottom = "80px";
            setTimeout(() => { man.style.bottom = "10px"; setTimeout(() => isJumping = false, 300); }, 300);
        }

        function startGame() {
            document.getElementById('lego-man-figure').classList.add('running');
            document.getElementById('startBtn').style.display = 'none';
        }

        tg.expand();
    </script>
</body>
</html>
