<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SVOY VPN PREMIUM</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --card-bg: #111111;
            --accent-color: #c2a379; 
            --text-main: #ffffff;
            --text-gray: #666666;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg-color); color: var(--text-main); margin: 0; font-family: -apple-system, system-ui, sans-serif; overflow: hidden; }

        .page { display: none; padding: 20px; height: 100vh; overflow-y: auto; padding-bottom: 120px; background: var(--bg-color); }
        .page.active { display: block; }

        /* БУКВЫ: БОЛЬШЕ И ПРЕЖНЯЯ ФОРМА */
        .logo-stage { height: 300px; display: flex; align-items: center; justify-content: center; }
        .sand-canvas-svg { width: 380px; height: 160px; overflow: visible; }
        .sand-letter {
            fill: none; stroke: var(--accent-color); stroke-width: 18; stroke-linecap: round; stroke-linejoin: round;
            stroke-dasharray: 1000; stroke-dashoffset: 1000;
            animation: draw 7s ease-in-out forwards, shake 5s infinite ease-in-out;
        }
        @keyframes draw { to { stroke-dashoffset: 0; } }
        @keyframes shake { 0%, 100% { transform: rotate(0deg); } 50% { transform: rotate(1.5deg); } }

        /* КНОПКИ: БОЛЬШЕ И ПУЛЬСИРУЮЩИЕ */
        .btn-main { 
            background: var(--accent-color); color: #000; border: none; 
            padding: 20px; border-radius: 30px; font-weight: 700; font-size: 16px;
            width: 100%; cursor: pointer; margin-bottom: 15px;
            box-shadow: 0 0 20px rgba(194, 163, 121, 0.2);
            animation: pulse-large 2.5s infinite ease-in-out;
        }
        .btn-main-dark { background: #1a1a1a; color: var(--text-main); border: 1px solid rgba(194, 163, 121, 0.3); }
        @keyframes pulse-large { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

        /* НАВИГАЦИЯ: СТИЛЬ EVO VPN С ИКОНКАМИ */
        .navigation { 
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); 
            width: 92%; height: 70px; background: var(--card-bg); 
            border-radius: 35px; display: flex; justify-content: space-around; 
            align-items: center; border: 1px solid rgba(194, 163, 121, 0.15); z-index: 1000;
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--text-gray); width: 20%; transition: 0.3s; z-index: 2; }
        .nav-item.active { color: var(--accent-color); }
        .nav-item span { font-size: 10px; margin-top: 4px; font-weight: 500; }
        .nav-indicator { position: absolute; width: 50px; height: 50px; background: rgba(194, 163, 121, 0.15); border-radius: 50%; transition: 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28); z-index: 1; }
        .nav-icon-svg { width: 24px; height: 24px; fill: currentColor; }

        /* ОСТАЛЬНЫЕ СТИЛИ (БЕЗ ИЗМЕНЕНИЙ) */
        .ios-card { background: var(--card-bg); border-radius: 18px; border: 1px solid rgba(194, 163, 121, 0.1); margin-bottom: 15px; overflow: hidden; }
        .ios-row { padding: 16px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .profile-avatar { width: 70px; height: 70px; border-radius: 50%; border: 2px solid var(--accent-color); margin: 0 auto 10px; overflow: hidden; }
        .accordion-content { display: none; padding: 15px; background: #0d0d0d; }
        .ios-card.open .accordion-content { display: block; }
    </style>
</head>
