<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SVOY VPN PREMIUM</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --card-bg: #141414;
            --accent-color: #c2a379; 
            --text-main: #e5e5e5;
            --text-gray: #737373;
            --nav-bg: #111111;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0; padding: 0;
            overflow: hidden; user-select: none;
        }

        .page { display: none; padding: 20px; height: calc(100vh - 90px); overflow-y: auto; box-sizing: border-box; }
        .page.active { display: block; }

        /* --- LOGO AREA --- */
        .logo-stage {
            height: 300px;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .sand-canvas-svg { width: 300px; height: 120px; overflow: visible; }
        .sand-letter {
            fill: none; stroke: var(--accent-color); stroke-width: 12;
            stroke-linecap: round; stroke-linejoin: round;
            stroke-dasharray: 1000; stroke-dashoffset: 1000;
            animation: drawSandLetter 3s forwards;
        }

        @keyframes drawSandLetter {
            0% { stroke-dashoffset: 1000; opacity: 0; }
            100% { stroke-dashoffset: 0; opacity: 1; }
        }

        /* --- BUTTONS --- */
        .bubble-btn {
            width: 100%; padding: 18px; border-radius: 20px; border: none;
            background: var(--card-bg); color: var(--text-main);
            font-weight: 600; font-size: 15px; margin-bottom: 12px;
            transition: 0.3s; border: 1px solid rgba(255,255,255,0.05);
        }
        .bubble-btn.primary { background: var(--accent-color); color: #000; }

        /* --- NAVIGATION --- */
        .navigation { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; height: 70px; background: var(--nav-bg); border-radius: 35px; display: flex; justify-content: space-around; align-items: center; border: 1px solid rgba(255,255,255,0.05); }
        .nav-item { color: var(--text-gray); display: flex; flex-direction: column; align-items: center; font-size: 10px; text-decoration: none; }
        .nav-item.active { color: var(--accent-color); }
        .nav-indicator { position: absolute; width: 50px; height: 50px; background: rgba(194, 163, 121, 0.1); border-radius: 50%; transition: 0.3s; z-index: -1; }
        
        .accent-value { color: var(--accent-color); font-weight: 700; }
    </style>
</head>
<body>

    <div id="page-home" class="page active">
        <div class="logo-stage">
            <svg class="sand-canvas-svg" viewBox="0 0 240 100">
                <path class="sand-letter" d="M40,30 c-20,0 -20,20 0,20 s20,20 0,20" />
                <path class="sand-letter" d="M75,30 l15,40 l15,-40" />
                <path class="sand-letter" d="M130,50 a15,20 0 1,0 30,0 a15,20 0 1,0 -30,0" />
                <path class="sand-letter" d="M185,30 l15,20 l15,-20 M200,50 l0,20" />
            </svg>
        </div>
        <div class="bottom-section">
            <button class="bubble-btn primary">Продлить доступ</button>
            <button class="bubble-btn">Подключить устройство</button>
        </div>
    </div>

    <div id="page-balance" class="page">
        <h2 style="text-align: center; letter-spacing: 2px;">БАЛАНС</h2>
        <div style="background: var(--card-bg); padding: 40px; border-radius: 24px; text-align: center; border: 1px solid #262626;">
            <div class="accent-value" id="balance-amount" style="font-size: 48px;">0.00 ₽</div>
            <div style="color: var(--text-gray); font-size: 12px; margin-top: 10px;">ДОСТУПНО К ВЫВОДУ</div>
        </div>
    </div>

    <!-- Остальные страницы (Profile, Subs, Game) добавь сюда как в прошлом коде -->

    <div class="navigation">
        <div class="nav-indicator" id="navIndicator"></div>
        <div class="nav-item active" onclick="showPage('home', this, 0)"><span>Главная</span></div>
        <div class="nav-item" onclick="showPage('balance', this, 2)"><span>Баланс</span></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // ЗАЩИТА: Проверка данных инициализации
        if (!tg.initDataUnsafe || !tg.initDataUnsafe.user) {
            document.body.innerHTML = '<div style="padding:50px; text-align:center;">Ошибка доступа. Откройте через бота.</div>';
        }

        function getParams() {
            const p = new URLSearchParams(window.location.search);
            return { ref: p.get('ref') || 0 };
        }

        function showPage(pageId, el, index) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('page-' + pageId).classList.add('active');
            el.classList.add('active');
            tg.HapticFeedback.impactOccurred('light');
        }

        window.onload = () => {
            const data = getParams();
            const balance = parseInt(data.ref) * 40;
            document.getElementById('balance-amount').innerText = balance + '.00 ₽';
        };
    </script>
</body>
</html>
