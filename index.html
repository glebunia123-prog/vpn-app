<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SVOY VPN PREMIUM</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --card-bg: #141414;
            --accent-color: #c2a379; 
            --text-main: #e5e5e5;
            --text-gray: #737373;
            --nav-bg: #111111;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0; padding: 0;
            overflow: hidden; user-select: none;
        }

        .page { display: none; padding: 20px; height: calc(100vh - 90px); overflow-y: auto; box-sizing: border-box; }
        .page.active { display: block; }

        /* ПУНКТ 1 & 2: БОЛЬШИЕ БУКВЫ И НАСЫПАНИЕ */
        .logo-stage { height: 300px; width: 100%; display: flex; align-items: center; justify-content: center; position: relative; }
        .sand-canvas-svg { width: 380px; height: 160px; overflow: visible; }
        .sand-letter {
            fill: none; stroke: var(--accent-color); stroke-width: 20;
            stroke-linecap: round; stroke-linejoin: round;
            stroke-dasharray: 1000; stroke-dashoffset: 1000;
            animation: drawSand 3s forwards, shake 5s infinite ease-in-out;
        }
        @keyframes drawSand { to { stroke-dashoffset: 0; } }
        @keyframes shake { 0%, 100% { transform: rotate(0deg); } 25% { transform: rotate(1.5deg); } 75% { transform: rotate(-1.5deg); } }

        /* ПУНКТ 3: ПУЛЬСИРУЮЩИЕ КНОПКИ */
        .bubble-btn {
            width: 100%; padding: 18px; border-radius: 30px; border: none;
            background: linear-gradient(145deg, #1a1a1a, #141414);
            color: var(--text-main); font-weight: 600; font-size: 14px;
            margin-bottom: 12px; cursor: pointer; box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            transition: 0.3s; display: flex; align-items: center; justify-content: center;
            animation: pulse 3s infinite ease-in-out;
        }
        .bubble-btn.primary { background: var(--accent-color); color: #000; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.04); } }

        /* iOS STYLE */
        .ios-card { background: var(--card-bg); border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 15px; overflow: hidden; }
        .ios-row { padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
        
        /* ПУНКТ 7: ШКАЛА ТРАФИКА */
        .progress-bar { width: 100%; height: 6px; background: #262626; border-radius: 3px; margin-top: 8px; overflow: hidden; }
        .progress-fill { width: 45%; height: 100%; background: var(--accent-color); }

        /* ПУНКТ 4: НАВИГАЦИЯ EVO */
        .navigation { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 92%; height: 70px; background: var(--nav-bg); border-radius: 35px; display: flex; justify-content: space-around; align-items: center; border: 1px solid rgba(194, 163, 121, 0.1); }
        .nav-item { display: flex; flex-direction: column; align-items: center; width: 20%; color: var(--text-gray); z-index: 2; }
        .nav-item.active { color: var(--accent-color); }
        .nav-indicator { position: absolute; width: 50px; height: 50px; background: rgba(194, 163, 121, 0.15); border-radius: 50%; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 1; }
        .nav-icon-svg { width: 22px; height: 22px; fill: currentColor; }

        /* ПРОФИЛЬ */
        .profile-header { display: flex; flex-direction: column; align-items: center; margin-bottom: 20px; }
        .profile-avatar { width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--accent-color); overflow: hidden; margin-bottom: 10px; }
        .accordion-content { display: none; padding: 15px; background: #1a1a1a; }
        .accordion.open .accordion-content { display: block; }
    </style>
</head>
<body>

    <!-- ГЛАВНАЯ -->
    <div id="page-home" class="page active">
        <div class="logo-stage">
            <svg class="sand-canvas-svg" viewBox="0 0 240 100">
                <path class="sand-letter" d="M40,30 c-20,0 -20,20 0,20 s20,20 0,20" />
                <path class="sand-letter" d="M75,30 l15,40 l15,-40" />
                <path class="sand-letter" d="M130,50 a15,20 0 1,0 30,0 a15,20 0 1,0 -30,0" />
                <path class="sand-letter" d="M185,30 l15,20 l15,-20 M200,50 l0,20" />
            </svg>
        </div>
        <button class="bubble-btn primary">🚀 Продлить доступ</button>
        <button class="bubble-btn">📱 Подключить устройство</button>
    </div>

    <!-- ПОДПИСКА -->
    <div id="page-subs" class="page">
        <div class="ios-card">
            <div class="ios-row"><span>Статус</span><span style="color: #34C759;">● Активна</span></div>
            <div style="padding: 20px; text-align: center;">
                <div style="font-size: 48px; font-weight: 800; color: var(--accent-color);">23:59:59</div>
                <div style="font-size: 12px; color: var(--text-gray);">ОСТАЛОСЬ ВРЕМЕНИ</div>
            </div>
        </div>
        <div style="display: flex; gap: 10px; margin-bottom: 15px;">
            <button class="bubble-btn primary" style="margin:0; flex:1; animation: pulse 2s infinite;">Продлить</button>
            <button class="bubble-btn" style="margin:0; flex:1; animation: none;">Тарифы</button>
        </div>
        <div class="ios-card">
            <div class="ios-row" style="flex-direction: column; align-items: flex-start;">
                <div style="display: flex; justify-content: space-between; width: 100%;">
                    <span>Трафик</span><span>1.2 GB / ∞</span>
                </div>
                <div class="progress-bar"><div class="progress-fill"></div></div>
            </div>
        </div>
    </div>

    <!-- БАЛАНС -->
    <div id="page-balance" class="page">
        <div class="ios-card" style="padding: 20px;">
            <div style="font-size: 12px; color: var(--text-gray);">БАЛАНС</div>
            <div style="font-size: 36px; font-weight: 700; margin: 10px 0;">0.00 ₽</div>
            <div style="display: flex; gap: 10px;">
                <button class="bubble-btn primary" style="padding: 10px; font-size: 12px;">Пополнить</button>
                <button class="bubble-btn" style="padding: 10px; font-size: 12px;">Промокод</button>
            </div>
        </div>
        <div class="ios-card" id="history-acc">
            <div class="ios-row" onclick="document.getElementById('history-acc').classList.toggle('open')">
                <span>История операций</span><span>▼</span>
            </div>
            <div class="accordion-content">Пока операций нет</div>
        </div>
    </div>

    <!-- ПРОФИЛЬ -->
    <div id="page-profile" class="page">
        <div class="profile-header">
            <div class="profile-avatar" id="user-photo"></div>
            <div id="display-name" style="font-size: 20px; font-weight: 700;">Пользователь</div>
            <div id="username-text" style="color: var(--text-gray);">@username</div>
        </div>
        <div class="ios-card accordion" id="profile-acc">
            <div class="ios-row" onclick="document.getElementById('profile-acc').classList.toggle('open')">
                <span>Информация об аккаунте</span><span>▼</span>
            </div>
            <div class="accordion-content">
                <div class="ios-row"><span>ID</span><span id="info-id">...</span></div>
            </div>
        </div>
    </div>

    <!-- НАВИГАЦИЯ -->
    <div class="navigation">
        <div class="nav-indicator" id="navIndicator"></div>
        <div class="nav-item active" onclick="showPage('home', this, 0)">
            <svg class="nav-icon-svg" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            <span>Главная</span>
        </div>
        <div class="nav-item" onclick="showPage('subs', this, 1)">
            <svg class="nav-icon-svg" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/></svg>
            <span>Подписка</span>
        </div>
        <div class="nav-item" onclick="showPage('balance', this, 2)">
            <svg class="nav-icon-svg" viewBox="0 0 24 24"><path d="M21 18v1c0 1.1-.9 2-2 2H5c-1.1 0-2-.9-2-2V5c0-1.1.9-2 2-2h14c1.1 0 2 .9 2 2v1h-9c-1.1 0-2 .9-2 2v8c0 1.1.9 2 2 2h9z"/></svg>
            <span>Баланс</span>
        </div>
        <div class="nav-item" onclick="showPage('profile', this, 3)">
            <svg class="nav-icon-svg" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
            <span>Профиль</span>
        </div>
        <div class="nav-item" onclick="showPage('game', this, 4)">
            <svg class="nav-icon-svg" viewBox="0 0 24 24"><path d="M21 6H3c-1.1 0-2 .9-2 2v8c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2z"/></svg>
            <span>Игра</span>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        function showPage(pageId, el, index) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('page-' + pageId).classList.add('active');
            el.classList.add('active');
            const step = document.querySelector('.navigation').offsetWidth / 5;
            document.getElementById('navIndicator').style.left = (step * index + (step/2 - 25)) + 'px';
            tg.HapticFeedback.impactOccurred('light');
        }
        window.onload = () => {
            const user = tg.initDataUnsafe?.user;
            if(user) {
                document.getElementById('display-name').innerText = user.first_name;
                document.getElementById('info-id').innerText = user.id;
            }
            showPage('home', document.querySelector('.nav-item'), 0);
        };
    </script>
</body>
</html>
