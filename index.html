<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SVOY VPN PREMIUM</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --card-bg: #111111;
            --accent-color: #c2a379; 
            --text-main: #ffffff;
            --text-gray: #666666;
        }

        /* ИСПРАВЛЕНО: Стили вынесены из :root, теперь они работают */
        .ios-card.open .accordion-content { display: block !important; }
        .ios-card.open .ios-row div { transform: rotate(-135deg) !important; }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg-color); color: var(--text-main); margin: 0; font-family: -apple-system, system-ui, sans-serif; overflow: hidden; }

        .page { display: none; padding: 20px; height: 100vh; overflow-y: auto; padding-bottom: 120px; background: var(--bg-color); }
        .page.active { display: block; }

        /* БУКВЫ */
        .logo-stage { height: 300px; display: flex; align-items: center; justify-content: center; }
        .sand-canvas-svg { width: 380px; height: 160px; overflow: visible; }
        .sand-letter {
            fill: none; stroke: var(--accent-color); stroke-width: 18; stroke-linecap: round; stroke-linejoin: round;
            stroke-dasharray: 1000; stroke-dashoffset: 1000;
            animation: draw 7s ease-in-out forwards, shake 5s infinite ease-in-out;
        }
        @keyframes draw { to { stroke-dashoffset: 0; } }
        @keyframes shake { 0%, 100% { transform: rotate(0deg); } 50% { transform: rotate(1.5deg); } }

        /* КНОПКИ */
        .btn-main { 
            background: var(--accent-color); color: #000; border: none; 
            padding: 20px; border-radius: 30px; font-weight: 700; font-size: 16px;
            width: 100%; cursor: pointer; margin-bottom: 15px;
            box-shadow: 0 0 20px rgba(194, 163, 121, 0.2);
            animation: pulse-large 2.5s infinite ease-in-out;
        }
        .btn-main-dark { background: #1a1a1a; color: var(--text-main); border: 1px solid rgba(194, 163, 121, 0.3); }
        @keyframes pulse-large { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

        /* НАВИГАЦИЯ */
        .navigation { 
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); 
            width: 92%; height: 70px; background: var(--card-bg); 
            border-radius: 35px; display: flex; justify-content: space-around; 
            align-items: center; border: 1px solid rgba(194, 163, 121, 0.15); z-index: 1000;
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--text-gray); width: 20%; transition: 0.3s; z-index: 2; cursor: pointer; }
        .nav-item.active { color: var(--accent-color); }
        .nav-item span { font-size: 10px; margin-top: 4px; font-weight: 500; }
        .nav-indicator { position: absolute; width: 50px; height: 50px; background: rgba(194, 163, 121, 0.15); border-radius: 50%; transition: 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28); z-index: 1; }
        .nav-icon-svg { width: 24px; height: 24px; fill: currentColor; }

        /* КАРТОЧКИ */
        .ios-card { background: var(--card-bg); border-radius: 18px; border: 1px solid rgba(194, 163, 121, 0.1); margin-bottom: 15px; overflow: hidden; }
        .ios-row { padding: 16px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .profile-avatar { width: 70px; height: 70px; border-radius: 50%; border: 2px solid var(--accent-color); margin: 0 auto 10px; overflow: hidden; }
    </style>
</head>
<body>

    <!-- ГЛАВНАЯ -->
    <div id="page-home" class="page active">
        <div class="logo-stage">
            <svg class="sand-canvas-svg" viewBox="0 0 240 100">
                <path class="sand-letter" d="M40,30 c-20,0 -20,20 0,20 s20,20 0,20" />
                <path class="sand-letter" d="M75,30 l15,40 l15,-40" />
                <path class="sand-letter" d="M130,50 a15,20 0 1,0 30,0 a15,20 0 1,0 -30,0" />
                <path class="sand-letter" d="M185,30 l15,20 l15,-20 M200,50 l0,20" />
            </svg>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px;">
            <div class="ios-card" style="padding:15px; text-align:center; margin:0;">
                <div style="font-size: 9px; color: var(--text-gray);">ПОДПИСКА ДО</div>
                <div style="font-size: 13px; font-weight: 600; color: var(--accent-color);">12.06.2026</div>
            </div>
            <div class="ios-card" style="padding:15px; text-align:center; margin:0;">
                <div style="font-size: 9px; color: var(--text-gray);">УСТРОЙСТВ</div>
                <div style="font-size: 13px; font-weight: 600; color: var(--accent-color);">1 / 3</div>
            </div>
        </div>
        <button class="btn-main">Продлить доступ</button>
        <button class="btn-main btn-main-dark">Подключить устройство</button>
    </div>

    <!-- ПОДПИСКА -->
    <div id="page-subs" class="page">
        <div class="ios-card">
            <div class="ios-row"><span>Статус</span><span style="color: #34C759; font-weight: 600;">● Активна</span></div>
            <div style="padding: 30px; text-align: center;">
                <div id="timer" style="font-size: 48px; font-weight: 800; color: var(--accent-color);">23:59:59</div>
                <div style="font-size: 11px; color: var(--text-gray); letter-spacing: 1px;">ОСТАЛОСЬ ВРЕМЕНИ</div>
            </div>
        </div>
        <div style="display: flex; gap: 10px; margin-bottom: 15px;">
            <button class="btn-main" style="margin:0; flex:1;">Продлить</button>
            <button class="btn-main btn-main-dark" style="margin:0; flex:1; animation:none;">Тарифы</button>
        </div>
        <div class="ios-card">
            <div class="ios-row" style="flex-direction: column; align-items: flex-start;">
                <div style="display: flex; justify-content: space-between; width: 100%; margin-bottom: 8px;">
                    <span>Трафик</span><span style="color: var(--accent-color);">1.2 GB / ∞</span>
                </div>
                <div style="width: 100%; height: 6px; background: #262626; border-radius: 3px; overflow: hidden;">
                    <div style="width: 45%; height: 100%; background: var(--accent-color);"></div>
                </div>
            </div>
            <div class="ios-row"><span>Устройства</span><span style="color: var(--accent-color);">1 / 3</span></div>
        </div>
    </div>

    <!-- БАЛАНС -->
<div id="page-balance" class="page">
    <div class="ios-card" style="padding: 20px;">
        <div style="font-size: 10px; color: var(--text-gray);">БАЛАНС</div>
        <div style="font-size: 32px; font-weight: 700; margin: 10px 0; color: var(--accent-color);">0.00 ₽</div>
        <div style="display: flex; gap: 10px;">
            <button class="btn-main" style="padding: 12px; font-size: 12px; margin:0; flex:1;">Пополнить</button>
            <button class="btn-main btn-main-dark" style="padding: 12px; font-size: 12px; margin:0; flex:1; animation:none;">Промокод</button>
        </div>
    </div>

    <!-- ВКЛАДКА ВЫИГРАННЫХ СРЕДСТВ -->
    <div class="ios-card" style="padding: 20px;">
        <div style="font-size: 10px; color: var(--text-gray); text-align: left;">БАЛАНС НА ВЫВОД СРЕДСТВ (ТВОЙ ЗАРАБОТОК)</div>
        <div style="font-size: 32px; font-weight: 700; color: var(--accent-color); margin: 10px 0; text-align: left;">0.00 ₽</div>
        <div style="display: flex; gap: 10px;">
            <button class="btn-main" style="padding: 12px; font-size: 12px; margin:0; flex:1;">Вывод</button>
            <button class="btn-main btn-main-dark" style="padding: 12px; font-size: 12px; margin:0; flex:1; animation:none;">Статистика</button>
        </div>
    </div>

    <!-- ИСТОРИЯ ОПЕРАЦИЙ -->
    <div class="ios-card" id="history-acc">
        <div class="ios-row" onclick="document.getElementById('history-acc').classList.toggle('open')">
            <span>История операций</span>
            <div style="width: 8px; height: 8px; border-right: 2px solid var(--text-gray); border-bottom: 2px solid var(--text-gray); transform: rotate(45deg); transition: 0.3s;"></div>
        </div>
        <div class="accordion-content" style="display: none; padding: 15px; background: #0d0d0d;">
            <div style="color: var(--text-gray); font-size: 13px; text-align: center;">Операций пока нет</div>
        </div>
    </div>
</div>

    <!-- ПРОФИЛЬ -->
    <div id="page-profile" class="page">
        <div class="profile-avatar" id="user-photo">
            <svg viewBox="0 0 24 24" fill="none" stroke="var(--accent-color)" stroke-width="1.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
        </div>
        <div style="text-align: center; margin-bottom: 20px;">
            <div id="display-name" style="font-size: 20px; font-weight: 700;">Пользователь</div>
            <div id="username-text" style="color: var(--text-gray); font-size: 13px;">@username</div>
        </div>
    </div>

    <!-- ИГРА -->
    <div id="page-game" class="page">
        <h2 style="text-align: center; letter-spacing: 3px; color: var(--accent-color);">SVOY GAME</h2>
        <div style="text-align: center; color: var(--text-gray); margin-top: 50px;">Скоро...</div>
    </div>

    <!-- НАВИГАЦИЯ -->
    <div class="navigation">
        <div class="nav-indicator" id="navIndicator"></div>
        <div class="nav-item active" onclick="showPage('home', this, 0)">
            <svg class="nav-icon-svg" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            <span>Главная</span>
        </div>
        <div class="nav-item" onclick="showPage('subs', this, 1)">
            <svg class="nav-icon-svg" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93z"/></svg>
            <span>Подписка</span>
        </div>
        <div class="nav-item" onclick="showPage('balance', this, 2)">
            <svg class="nav-icon-svg" viewBox="0 0 24 24"><path d="M21 18v1c0 1.1-.9 2-2 2H5c-1.1 0-2-.9-2-2V5c0-1.1.9-2 2-2h14c1.1 0 2 .9 2 2v1h-9c-1.1 0-2 .9-2 2v8c0 1.1.9 2 2 2h9zm-9-2h10V8H12v8z"/></svg>
            <span>Баланс</span>
        </div>
        <div class="nav-item" onclick="showPage('profile', this, 3)">
            <svg class="nav-icon-svg" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
            <span>Профиль</span>
        </div>
        <div class="nav-item" onclick="showPage('game', this, 4)">
            <svg class="nav-icon-svg" viewBox="0 0 24 24"><path d="M21 6H3c-1.1 0-2 .9-2 2v8c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm-10 7H8v3H6v-3H3v-2h3V8h2v3h3v2z"/></svg>
            <span>Игра</span>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        function showPage(pId, el, idx) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            const targetPage = document.getElementById('page-' + pId);
            if (targetPage) targetPage.classList.add('active');
            el.classList.add('active');
            
            const nav = document.querySelector('.navigation');
            const step = nav.offsetWidth / 5;
            document.getElementById('navIndicator').style.left = (step * idx + (step/2 - 25)) + 'px';
            tg.HapticFeedback.impactOccurred('light');
        }

        window.onload = () => {
    const user = tg.initDataUnsafe?.user;
    const params = new URLSearchParams(window.location.search);
    
    // Если зашли через кнопку в сообщении - берем из ссылки
    // Если через синюю кнопку - ставим 0 (пока не настроен API запрос к БД)
    let refCount = params.get('ref');
    
    if (user) {
        document.getElementById('display-name').innerText = user.first_name;
        document.getElementById('info-id').innerText = user.id;
        document.getElementById('username-text').innerText = user.username ? '@' + user.username : 'id' + user.id;
        
        if (user.photo_url) {
            document.getElementById('user-photo').innerHTML = `<img src="${user.photo_url}" style="width:100%;height:100%;object-fit:cover;">`;
        }
    }

    // Логика отображения баланса
    const balanceAmount = refCount ? (parseInt(refCount) * 40) : 0;
    const balanceElements = document.querySelectorAll('[id^="balance-amount"], .ios-card div[style*="32px"]');
    
    // Обновляем все места, где написан баланс 0.00 ₽
    balanceElements.forEach(el => {
        if (el.innerText.includes('₽')) {
            el.innerText = balanceAmount + '.00 ₽';
        }
    });

    // Инициализация индикатора навигации
    const nav = document.querySelector('.navigation');
    const step = nav.offsetWidth / 5;
    document.getElementById('navIndicator').style.left = (step / 2 - 25) + 'px';

    // Таймер
    function updateTimer() {
        const now = new Date();
        const endOfDay = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 23, 59, 59);
        let diff = Math.floor((endOfDay - now) / 1000);
        if (diff < 0) diff = 0;
        const h = Math.floor(diff / 3600).toString().padStart(2, '0');
        const m = Math.floor((diff % 3600) / 60).toString().padStart(2, '0');
        const s = (diff % 60).toString().padStart(2, '0');
        const timerEl = document.getElementById('timer');
        if (timerEl) timerEl.innerText = `${h}:${m}:${s}`;
    }
    setInterval(updateTimer, 1000);
    updateTimer();
};

    </script>
</body>
</html>
