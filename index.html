<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SVOY VPN PREMIUM</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --card-bg: #141414;
            --accent-color: #c2a379; 
            --text-main: #e5e5e5;
            --text-gray: #737373;
            --nav-bg: #111111;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        html, body {
            background-color: var(--bg-color) !important;
            margin: 0; padding: 0;
            height: 100vh; width: 100vw;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        /* ИСПРАВЛЕНИЕ ФОНА: Теперь он везде черный */
        .page { 
            display: none; 
            padding: 20px; 
            height: 100vh; 
            width: 100%;
            overflow-y: auto; 
            padding-bottom: 120px;
            background-color: var(--bg-color);
            position: absolute;
            top: 0; left: 0;
        }
        .page.active { display: block; }

        /* АНИМАЦИЯ НАСЫПАНИЯ (5 СЕКУНД) */
        .logo-stage { height: 280px; width: 100%; display: flex; align-items: center; justify-content: center; }
        .sand-canvas-svg { width: 340px; height: 140px; overflow: visible; }
        .sand-letter {
            fill: none; stroke: var(--accent-color); stroke-width: 16;
            stroke-linecap: round; stroke-linejoin: round;
            stroke-dasharray: 1000; stroke-dashoffset: 1000;
            animation: drawSand 5s ease-out forwards, shake 5s infinite ease-in-out;
        }
        @keyframes drawSand { to { stroke-dashoffset: 0; } }
        @keyframes shake { 0%, 100% { transform: rotate(0deg); } 25% { transform: rotate(1deg); } 75% { transform: rotate(-1deg); } }

        /* КНОПКИ БЕЗ СМАЙЛИКОВ */
        .bubble-btn {
            width: 100%; padding: 18px; border-radius: 30px; border: none;
            background: linear-gradient(145deg, #1a1a1a, #141414);
            color: var(--text-main); font-weight: 600; font-size: 14px;
            margin-bottom: 12px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            animation: pulse 3s infinite ease-in-out;
            border: 1px solid rgba(194, 163, 121, 0.1);
        }
        .bubble-btn.primary { background: var(--accent-color); color: #000; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.03); } }

        /* iOS КАРТОЧКИ */
        .ios-card { background: var(--card-bg); border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); margin-bottom: 15px; overflow: hidden; }
        .ios-row { padding: 16px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .ios-row:last-child { border-bottom: none; }

        /* НАВИГАЦИЯ EVO */
        .navigation { 
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); 
            width: 92%; height: 70px; background: var(--nav-bg); 
            border-radius: 35px; display: flex; justify-content: space-around; 
            align-items: center; border: 1px solid rgba(194, 163, 121, 0.15); z-index: 1000;
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; width: 20%; color: var(--text-gray); transition: 0.3s; z-index: 2; }
        .nav-item.active { color: var(--accent-color); }
        .nav-item span { font-size: 10px; margin-top: 4px; font-weight: 500; }
        .nav-indicator { position: absolute; width: 48px; height: 48px; background: rgba(194, 163, 121, 0.15); border-radius: 50%; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 1; }
        .nav-icon-svg { width: 24px; height: 24px; fill: currentColor; }

        /* АККОРДЕОН */
        .accordion-content { display: none; padding: 0 16px 16px 16px; background: var(--card-bg); }
        .ios-card.open .accordion-content { display: block; }
        .arrow { width: 8px; height: 8px; border-right: 2px solid var(--text-gray); border-bottom: 2px solid var(--text-gray); transform: rotate(45deg); transition: 0.3s; }
        .ios-card.open .arrow { transform: rotate(-135deg); }
    </style>
</head>
<body>

    <!-- ГЛАВНАЯ -->
    <div id="page-home" class="page active">
        <div class="logo-stage">
            <svg class="sand-canvas-svg" viewBox="0 0 240 100">
                <path class="sand-letter" d="M40,30 c-20,0 -20,20 0,20 s20,20 0,20" />
                <path class="sand-letter" d="M75,30 l15,40 l15,-40" />
                <path class="sand-letter" d="M130,50 a15,20 0 1,0 30,0 a15,20 0 1,0 -30,0" />
                <path class="sand-letter" d="M185,30 l15,20 l15,-20 M200,50 l0,20" />
            </svg>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px;">
            <div class="ios-card" style="margin:0; padding:15px;">
                <div style="font-size: 10px; color: var(--text-gray);">ПОДПИСКА ДО</div>
                <div style="font-size: 14px; font-weight: 600; color: var(--accent-color);">12.06.2026</div>
            </div>
            <div class="ios-card" style="margin:0; padding:15px;">
                <div style="font-size: 10px; color: var(--text-gray);">УСТРОЙСТВ</div>
                <div style="font-size: 14px; font-weight: 600; color: var(--accent-color);">1 / 3</div>
            </div>
        </div>
        <button class="bubble-btn primary">Продлить доступ</button>
        <button class="bubble-btn">Подключить устройство</button>
    </div>

    <!-- ПОДПИСКА -->
    <div id="page-subs" class="page">
        <div class="ios-card">
            <div class="ios-row"><span>Статус</span><span style="color: #34C759; font-weight: 600;">● Активна</span></div>
            <div style="padding: 30px; text-align: center;">
                <div style="font-size: 48px; font-weight: 800; color: var(--accent-color);">23:59:59</div>
                <div style="font-size: 11px; color: var(--text-gray); letter-spacing: 1px;">ОСТАЛОСЬ ВРЕМЕНИ</div>
            </div>
        </div>
        <div style="display: flex; gap: 10px; margin-bottom: 15px;">
            <button class="bubble-btn primary" style="margin:0; flex:1;">Продлить</button>
            <button class="bubble-btn" style="margin:0; flex:1; animation:none;">Тарифы</button>
        </div>
    </div>

    <!-- БАЛАНС -->
    <div id="page-balance" class="page">
        <div class="ios-card" style="padding: 20px;">
            <div style="font-size: 11px; color: var(--text-gray); letter-spacing: 1px;">БАЛАНС</div>
            <div style="font-size: 36px; font-weight: 700; margin: 10px 0;">0.00 ₽</div>
            <div style="display: flex; gap: 10px;">
                <button class="bubble-btn primary" style="padding: 12px; font-size: 12px; margin:0;">Пополнить</button>
                <button class="bubble-btn" style="padding: 12px; font-size: 12px; margin:0; animation:none;">Промокод</button>
            </div>
        </div>

        <div class="ios-card" style="padding: 20px; text-align: center;">
            <div style="font-size: 11px; color: var(--text-gray); letter-spacing: 1px;">БАЛАНС НА ВЫВОД</div>
            <div style="font-size: 32px; font-weight: 700; color: var(--accent-color); margin: 15px 0;">0.00 ₽</div>
            <div style="display: flex; gap: 10px;">
                <button class="bubble-btn" style="margin:0; flex:1; animation:none;">Вывод</button>
                <button class="bubble-btn" style="margin:0; flex:1; animation:none;">Статистика</button>
            </div>
        </div>

        <div class="ios-card" id="history-acc">
            <div class="ios-row" onclick="document.getElementById('history-acc').classList.toggle('open')">
                <span>История операций</span><div class="arrow"></div>
            </div>
            <div class="accordion-content"><div style="color: var(--text-gray); font-size: 13px; text-align: center; padding: 10px;">Операций пока нет</div></div>
        </div>
    </div>

    <!-- ПРОФИЛЬ -->
    <div id="page-profile" class="page">
        <div class="profile-header">
            <div class="profile-avatar" id="user-photo">
                <svg viewBox="0 0 24 24" fill="none" stroke="var(--accent-color)" stroke-width="1.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            </div>
            <div id="display-name" style="font-size: 22px; font-weight: 700;">Пользователь</div>
            <div id="username-text" style="color: var(--text-gray); font-size: 14px;">@username</div>
        </div>
        <div class="ios-card" id="profile-acc">
            <div class="ios-row" onclick="document.getElementById('profile-acc').classList.toggle('open')">
                <span>Информация об аккаунте</span><div class="arrow"></div>
            </div>
            <div class="accordion-content">
                <div class="ios-row" style="padding: 10px 0;"><span>ID</span><span id="info-id" style="color: var(--accent-color);">...</span></div>
                <div class="ios-row" style="padding: 10px 0;"><span>Имя</span><span id="info-name">...</span></div>
                <div class="ios-row" style="padding: 10px 0;"><span>Username</span><span id="info-user">...</span></div>
            </div>
        </div>
    </div>

    <!-- НАВИГАЦИЯ -->
    <div class="navigation">
        <div class="nav-indicator" id="navIndicator"></div>
        <div class="nav-item active" onclick="showPage('home', this, 0)">
            <svg class="nav-icon-svg" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            <span>Главная</span>
        </div>
        <div class="nav-item" onclick="showPage('subs', this, 1)">
            <svg class="nav-icon-svg" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/></svg>
            <span>Подписка</span>
        </div>
        <div class="nav-item" onclick="showPage('balance', this, 2)">
            <svg class="nav-icon-svg" viewBox="0 0 24 24"><path d="M21 18v1c0 1.1-.9 2-2 2H5c-1.1 0-2-.9-2-2V5c0-1.1.9-2 2-2h14c1.1 0 2 .9 2 2v1h-9c-1.1 0-2 .9-2 2v8c0 1.1.9 2 2 2h9z"/></svg>
            <span>Баланс</span>
        </div>
        <div class="nav-item" onclick="showPage('profile', this, 3)">
            <svg class="nav-icon-svg" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
            <span>Профиль</span>
        </div>
        <div class="nav-item" onclick="showPage('game', this, 4)">
            <svg class="nav-icon-svg" viewBox="0 0 24 24"><path d="M21 6H3c-1.1 0-2 .9-2 2v8c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2z"/></svg>
            <span>Игра</span>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        function showPage(pageId, el, index) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('page-' + pageId).classList.add('active');
            el.classList.add('active');
            
            const navWidth = document.querySelector('.navigation').offsetWidth;
            const step = navWidth / 5;
            document.getElementById('navIndicator').style.left = (step * index + (step/2 - 24)) + 'px';
            tg.HapticFeedback.impactOccurred('light');
        }

        window.onload = () => {
            const user = tg.initDataUnsafe?.user;
            if (user) {
                document.getElementById('display-name').innerText = user.first_name;
                document.getElementById('info-id').innerText = user.id;
                document.getElementById('info-name').innerText = user.first_name;
                document.getElementById('info-user').innerText = user.username ? '@' + user.username : 'нет';
                if (user.photo_url) document.getElementById('user-photo').innerHTML = `<img src="${user.photo_url}" style="width:100%;height:100%;object-fit:cover;">`;
            }
            const navWidth = document.querySelector('.navigation').offsetWidth;
            document.getElementById('navIndicator').style.left = (navWidth / 10 - 24) + 'px';
        };
    </script>
</body>
</html>
