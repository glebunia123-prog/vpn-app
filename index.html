<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SVOY VPN PREMIUM</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --card-bg: #141414;
            --accent-color: #c2a379; /* Золото как в видео */
            --text-main: #e5e5e5;
            --text-gray: #737373;
            --nav-bg: #111111;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0; padding: 0;
            overflow: hidden; user-select: none;
        }

        .page { display: none; padding: 20px; height: calc(100vh - 90px); overflow-y: auto; box-sizing: border-box; }
        .page.active { display: block; }

        /* --- АНИМАЦИЯ ЛОГОТИПА --- */
        .logo-stage { height: 280px; width: 100%; display: flex; align-items: center; justify-content: center; position: relative; }
        .sand-canvas-svg { width: 280px; height: 100px; overflow: visible; }
        .sand-letter {
            fill: none; stroke: var(--accent-color); stroke-width: 14;
            stroke-linecap: round; stroke-linejoin: round;
            stroke-dasharray: 1000; stroke-dashoffset: 1000;
            animation: drawSandLetter 3s forwards;
        }
        @keyframes drawSandLetter { 0% { stroke-dashoffset: 1000; opacity: 0; } 100% { stroke-dashoffset: 0; opacity: 1; } }

        /* --- КНОПКИ ПУЛЬСИРУЮЩИЕ --- */
        .bubble-btn {
            width: 100%; padding: 18px; border-radius: 30px; border: none;
            background: linear-gradient(145deg, #1a1a1a, #141414);
            color: var(--text-main); font-weight: 600; font-size: 14px;
            margin-bottom: 12px; cursor: pointer; box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            transition: 0.3s; display: flex; align-items: center; justify-content: center;
            animation: bubblePulse 4s infinite ease-in-out;
            border: 1px solid rgba(194, 163, 121, 0.1);
        }
        .bubble-btn.primary { background: var(--accent-color); color: #000; }
        @keyframes bubblePulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.03); } }

        /* --- ПРОФИЛЬ --- */
        .profile-header { display: flex; flex-direction: column; align-items: center; margin-bottom: 30px; }
        .profile-avatar { width: 85px; height: 85px; border-radius: 50%; background: #1a1a1a; border: 2px solid var(--accent-color); margin-bottom: 12px; overflow: hidden; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 15px rgba(194, 163, 121, 0.2); }
        .profile-avatar img { width: 100%; height: 100%; object-fit: cover; }
        
        .accordion { background: var(--card-bg); border-radius: 20px; border: 1px solid rgba(194, 163, 121, 0.1); overflow: hidden; }
        .accordion-header { padding: 18px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .accordion-content { display: none; padding: 0 18px 18px 18px; font-size: 14px; border-top: 1px solid rgba(255,255,255,0.05); }
        .accordion.open .accordion-content { display: block; }
        .info-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }

        /* --- НАВИГАЦИЯ --- */
        .navigation { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 92%; height: 70px; background: rgba(17, 17, 17, 0.95); backdrop-filter: blur(10px); border-radius: 35px; display: flex; justify-content: space-around; align-items: center; border: 1px solid rgba(194, 163, 121, 0.1); z-index: 1000; }
        .nav-item { position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 20%; height: 100%; color: var(--text-gray); transition: 0.3s; z-index: 2; }
        .nav-item.active { color: var(--accent-color); }
        .nav-item span { font-size: 9px; margin-top: 4px; font-weight: 500; }
        .nav-indicator { position: absolute; top: 50%; transform: translateY(-50%); width: 45px; height: 45px; background: rgba(194, 163, 121, 0.12); border-radius: 50%; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 1; }
        .nav-icon-svg { width: 22px; height: 22px; fill: currentColor; }
    </style>
</head>
<body>

    <!-- ГЛАВНАЯ -->
    <div id="page-home" class="page active">
        <div class="logo-stage">
            <svg class="sand-canvas-svg" viewBox="0 0 240 100">
                <path class="sand-letter" d="M40,30 c-20,0 -20,20 0,20 s20,20 0,20" />
                <path class="sand-letter" d="M75,30 l15,40 l15,-40" />
                <path class="sand-letter" d="M130,50 a15,20 0 1,0 30,0 a15,20 0 1,0 -30,0" />
                <path class="sand-letter" d="M185,30 l15,20 l15,-20 M200,50 l0,20" />
            </svg>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px;">
            <div style="background: var(--card-bg); padding: 15px; border-radius: 20px; border: 1px solid rgba(194, 163, 121, 0.1);">
                <div style="font-size: 9px; color: var(--text-gray); letter-spacing: 1px;">ПОДПИСКА ДО</div>
                <div style="font-size: 14px; font-weight: 600; color: var(--accent-color);">12.06.2026</div>
            </div>
            <div style="background: var(--card-bg); padding: 15px; border-radius: 20px; border: 1px solid rgba(194, 163, 121, 0.1);">
                <div style="font-size: 9px; color: var(--text-gray); letter-spacing: 1px;">УСТРОЙСТВ</div>
                <div style="font-size: 14px; font-weight: 600; color: var(--accent-color);">1 / 3</div>
            </div>
        </div>
        <button class="bubble-btn primary">Продлить доступ</button>
        <button class="bubble-btn">Подключить устройство</button>
    </div>

    <!-- ПОДПИСКА -->
    <div id="page-subs" class="page">
        <h2 style="text-align: center; letter-spacing: 4px; color: var(--accent-color);">ТАРИФЫ</h2>
        <div style="background: var(--card-bg); padding: 20px; border-radius: 20px; border: 1px solid rgba(194, 163, 121, 0.1); margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center;">
            <span style="font-weight: 600;">1 МЕСЯЦ</span>
            <span style="color: var(--accent-color); font-weight: 800; font-size: 18px;">220₽</span>
        </div>
    </div>

    <!-- БАЛАНС -->
    <div id="page-balance" class="page">
        <h2 style="text-align: center; letter-spacing: 4px; color: var(--accent-color);">БАЛАНС</h2>
        <div style="background: var(--card-bg); padding: 50px 0; border-radius: 25px; border: 1px solid rgba(194, 163, 121, 0.1); text-align: center; box-shadow: inset 0 0 20px rgba(0,0,0,0.5);">
            <div id="balance-amount" style="font-size: 46px; font-weight: 800; color: var(--accent-color); text-shadow: 0 0 15px rgba(194, 163, 121, 0.3);">0.00 ₽</div>
            <div style="font-size: 10px; color: var(--text-gray); letter-spacing: 2px; margin-top: 10px;">ДОСТУПНО К ВЫВОДУ</div>
        </div>
    </div>

    <!-- ПРОФИЛЬ -->
    <div id="page-profile" class="page">
        <div class="profile-header">
            <div class="profile-avatar" id="user-photo">
                <svg viewBox="0 0 24 24" fill="none" stroke="var(--accent-color)" stroke-width="1.5" style="width: 40px;"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            </div>
            <div id="display-name" style="font-size: 22px; font-weight: 700; letter-spacing: 0.5px;">Пользователь</div>
            <div id="username-text" style="font-size: 14px; color: var(--text-gray); margin-top: 4px;">@username</div>
        </div>
        <div class="accordion" id="infoAccordion">
            <div class="accordion-header" onclick="toggleAccordion()">
                <div style="display: flex; align-items: center; gap: 12px;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="var(--accent-color)"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                    <span style="font-weight: 500;">Информация об аккаунте</span>
                </div>
                <div style="border-right: 2px solid var(--accent-color); border-bottom: 2px solid var(--accent-color); width: 8px; height: 8px; transform: rotate(45deg);"></div>
            </div>
            <div class="accordion-content">
                <div class="info-row"><span>Telegram ID</span><span id="info-id" style="color: var(--accent-color);">...</span></div>
                <div class="info-row"><span>Username</span><span id="info-username" style="color: var(--accent-color);">...</span></div>
            </div>
        </div>
    </div>

    <!-- ИГРА -->
    <div id="page-game" class="page">
        <h2 style="text-align: center; letter-spacing: 4px; color: var(--accent-color);">SVOY GAME</h2>
        <div style="background: var(--card-bg); height: 220px; border-radius: 25px; border: 1px solid rgba(194, 163, 121, 0.1); display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 15px;">
            <svg width="50" height="50" viewBox="0 0 24 24" fill="var(--text-gray)"><path d="M21 6H3c-1.1 0-2 .9-2 2v8c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm-10 7H8v3H6v-3H3v-2h3V8h2v3h3v2z"/></svg>
            <span style="color: var(--text-gray); font-weight: 500; letter-spacing: 1px;">СКОРО В ИГРЕ...</span>
        </div>
    </div>

    <!-- НАВИГАЦИЯ -->
    <div class="navigation">
        <div class="nav-indicator" id="navIndicator"></div>
        <div class="nav-item active" onclick="showPage('home', this, 0)">
            <svg class="nav-icon-svg" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            <span>Главная</span>
        </div>
        <div class="nav-item" onclick="showPage('subs', this, 1)">
            <svg class="nav-icon-svg" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93z"/></svg>
            <span>Подписка</span>
        </div>
        <div class="nav-item" onclick="showPage('balance', this, 2)">
            <svg class="nav-icon-svg" viewBox="0 0 24 24"><path d="M21 18v1c0 1.1-.9 2-2 2H5c-1.1 0-2-.9-2-2V5c0-1.1.9-2 2-2h14c1.1 0 2 .9 2 2v1h-9c-1.1 0-2 .9-2 2v8c0 1.1.9 2 2 2h9zm-9-2h10V8H12v8z"/></svg>
            <span>Баланс</span>
        </div>
        <div class="nav-item" onclick="showPage('profile', this, 3)">
            <svg class="nav-icon-svg" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
            <span>Профиль</span>
        </div>
        <div class="nav-item" onclick="showPage('game', this, 4)">
            <svg class="nav-icon-svg" viewBox="0 0 24 24"><path d="M21 6H3c-1.1 0-2 .9-2 2v8c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm-10 7H8v3H6v-3H3v-2h3V8h2v3h3v2zm4.5 2c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zm4-3c-.83 0-1.5-.67-1.5-1.5S18.67 9 19.5 9s1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/></svg>
            <span>Игра</span>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // ЗАЩИТА: Проверка, что открыто в Telegram
        if (!tg.initDataUnsafe || !tg.initDataUnsafe.user) {
            document.body.innerHTML = '<div style="display:flex;justify-content:center;align-items:center;height:100vh;color:#c2a379;text-align:center;padding:20px;">ДОСТУП ЗАБЛОКИРОВАН<br>Откройте приложение через официального бота SVOY VPN</div>';
        }

        function showPage(pageId, el, index) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('page-' + pageId).classList.add('active');
            el.classList.add('active');
            
            const navWidth = document.querySelector('.navigation').offsetWidth;
            const step = navWidth / 5;
            document.getElementById('navIndicator').style.left = (step * index + (step/2 - 22.5)) + 'px';
            tg.HapticFeedback.impactOccurred('light');
        }

        function toggleAccordion() {
            document.getElementById('infoAccordion').classList.toggle('open');
            tg.HapticFeedback.impactOccurred('light');
        }

        window.onload = () => {
            const user = tg.initDataUnsafe?.user;
            const params = new URLSearchParams(window.location.search);
            
            if (user) {
                document.getElementById('display-name').innerText = user.first_name;
                document.getElementById('username-text').innerText = user.username ? '@' + user.username : 'id' + user.id;
                document.getElementById('info-id').innerText = user.id;
                document.getElementById('info-username').innerText = user.username ? '@' + user.username : 'нет';
                if (user.photo_url) document.getElementById('user-photo').innerHTML = `<img src="${user.photo_url}">`;
            }

            // Расчет баланса из параметров URL (защищенная передача из бота)
            const refCount = parseInt(params.get('ref')) || 0;
            document.getElementById('balance-amount').innerText = (refCount * 40) + '.00 ₽';

            // Инициализация индикатора
            const navWidth = document.querySelector('.navigation').offsetWidth;
            document.getElementById('navIndicator').style.left = (navWidth / 10 - 22.5) + 'px';
        };
    </script>
</body>
</html>
