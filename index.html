<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SVOY VPN PREMIUM</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0a0a0a; /* Глубокий черный */
            --card-bg: #141414; /* Графитовый */
            --accent-color: #d4af37; /* Благородное золото/беж */
            --accent-soft: rgba(212, 175, 55, 0.1);
            --text-main: #e5e5e5;
            --text-gray: #737373;
            --lego-yellow: #d4af37;
            --cap-color: #262626;
        }

        body {
            font-family: "SF Pro Display", -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0; padding: 0;
            overflow: hidden; user-select: none;
        }

        .page { display: none; padding: 20px; height: calc(100vh - 85px); overflow-y: auto; box-sizing: border-box; }
        .page.active { display: block; }

        /* --- HOME PAGE (PREMIUM STYLE) --- */
        .home-header { text-align: center; margin-top: 10px; margin-bottom: 30px; }
        .logo-svoy { font-size: 32px; font-weight: 200; letter-spacing: 8px; text-transform: uppercase; }
        .logo-svoy span { font-weight: 800; color: var(--accent-color); }

        .power-container { display: flex; justify-content: center; margin: 40px 0; }
        .power-btn { 
            width: 160px; height: 160px; border-radius: 50%; 
            background: linear-gradient(145deg, #1a1a1a, #0f0f0f);
            border: 1px solid #262626;
            display: flex; align-items: center; justify-content: center;
            font-size: 55px; color: #404040; cursor: pointer; transition: 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 20px 20px 60px #050505, -5px -5px 20px #1a1a1a;
        }
        .power-btn.active { 
            color: var(--accent-color); 
            border-color: var(--accent-color); 
            box-shadow: 0 0 50px rgba(212, 175, 55, 0.2);
            text-shadow: 0 0 20px var(--accent-color);
        }

        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .info-card { 
            background: var(--card-bg); padding: 18px; border-radius: 20px; 
            border: 1px solid #262626; transition: 0.3s;
        }
        .info-label { font-size: 10px; color: var(--text-gray); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px; }
        .info-value { font-size: 14px; font-weight: 600; letter-spacing: 0.5px; }

        .traffic-card { background: var(--card-bg); padding: 20px; border-radius: 24px; border: 1px solid #262626; margin-bottom: 20px; }
        .progress-container { height: 4px; background: #262626; border-radius: 2px; margin: 12px 0; overflow: hidden; }
        .progress-bar { height: 100%; background: var(--accent-color); width: 35%; border-radius: 2px; box-shadow: 0 0 10px var(--accent-color); }

        .action-btn { 
            width: 100%; padding: 16px; border-radius: 18px; border: 1px solid #262626; 
            background: #141414; color: white; font-weight: 500; font-size: 13px;
            margin-bottom: 12px; cursor: pointer; transition: 0.3s;
            letter-spacing: 1px; text-transform: uppercase;
        }
        .action-btn.primary { background: var(--accent-color); color: black; border: none; font-weight: 700; }

        /* --- GAME (ADAPTED TO BEIGE/DARK) --- */
        #game-container { width: 100%; height: 160px; background: #0a0a0a; border-radius: 24px; position: relative; overflow: hidden; border: 1px solid #262626; }
        .stars { position: absolute; width: 200%; height: 100%; background-image: radial-gradient(1px 1px at 20px 30px, var(--accent-color), rgba(0,0,0,0)), radial-gradient(1.5px 1.5px at 50px 80px, #fff, rgba(0,0,0,0)); background-size: 180px 180px; animation: starScroll 25s linear infinite; opacity: 0.4; }
        @keyframes starScroll { from { left: 0; } to { left: -100%; } }
        .horizon { position: absolute; bottom: 0; width: 100%; height: 1px; background: var(--accent-color); opacity: 0.3; }

        .lego-figure { position: relative; width: 30px; height: 50px; display: inline-block; }
        .lego-head { position: absolute; top: 5px; left: 7px; width: 14px; height: 14px; background: var(--accent-color); border-radius: 4px; z-index: 10; }
        .lego-body { position: absolute; top: 18px; left: 4px; width: 20px; height: 22px; background: #1a1a1a; border: 1px solid var(--accent-color); border-radius: 4px; z-index: 5; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 900; color: var(--accent-color); }
        .lego-limb { position: absolute; background: #1a1a1a; border: 1px solid var(--accent-color); border-radius: 3px; }
        .arm { width: 5px; height: 14px; top: 20px; left: 12px; z-index: 6; }
        .leg { width: 8px; height: 16px; top: 38px; left: 10px; z-index: 6; }
        .running .leg { animation: runCycle 0.4s infinite alternate ease-in-out; }
        @keyframes runCycle { from { transform: rotate(-25deg); } to { transform: rotate(25deg); } }

        .app-icon { width: 32px; height: 32px; border-radius: 10px; background-size: 70%; background-position: center; background-repeat: no-repeat; background-color: #1a1a1a !important; border: 1px solid #262626; }
        .app-icon.locked { opacity: 0.2; filter: grayscale(1); }
        #stairs { display: flex; align-items: flex-end; height: 130px; margin: 15px 0; position: relative; justify-content: space-between; }

        /* --- NAV BAR --- */
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: #0a0a0a; display: flex; padding: 12px 0 30px 0; border-top: 1px solid #1a1a1a; }
        .nav-item { flex: 1; text-align: center; color: #404040; font-size: 9px; display: flex; flex-direction: column; align-items: center; text-transform: uppercase; letter-spacing: 1px; }
        .nav-item.active { color: var(--accent-color); }
        .nav-icon { font-size: 20px; margin-bottom: 5px; }
    </style>
</head>
<body>

    <div id="page-home" class="page active">
        <div class="home-header">
            <div class="logo-svoy">SVOY<span>VPN</span></div>
        </div>
        <div class="power-container">
            <div class="power-btn" id="powerBtn" onclick="toggleConnect()">⏻</div>
        </div>
        <div class="info-grid">
            <div class="info-card">
                <div class="info-label">Подписка до</div>
                <div class="info-value">12.06.2026</div>
            </div>
            <div class="info-card">
                <div class="info-label">Устройств</div>
                <div class="info-value">1 / 3</div>
            </div>
        </div>
        <div class="traffic-card">
            <div style="display: flex; justify-content: space-between;">
                <div class="info-label">Использовано трафика</div>
                <div class="info-value" style="font-size: 12px; color: var(--accent-color);">4.2 ГБ / ∞</div>
            </div>
            <div class="progress-container">
                <div class="progress-bar"></div>
            </div>
        </div>
        <button class="action-btn primary" onclick="showPage('subs', document.querySelectorAll('.nav-item')[1])">Продлить доступ</button>
        <button class="action-btn">Подключить устройство</button>
    </div>

    <div id="page-subs" class="page">
        <h2 style="text-align: center; font-weight: 200; letter-spacing: 3px;">ТАРИФЫ</h2>
        <div class="info-card" style="margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center;">
            <span>1 МЕСЯЦ</span><span style="color: var(--accent-color); font-weight: 700;">220₽</span>
        </div>
        <div class="info-card" style="margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border-color: var(--accent-color);">
            <span>3 МЕСЯЦА</span><span style="color: var(--accent-color); font-weight: 700;">560₽</span>
        </div>
        <div class="info-card" style="margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center;">
            <span>12 МЕСЯЦЕВ</span><span style="color: var(--accent-color); font-weight: 700;">1480₽</span>
        </div>
    </div>

    <div id="page-balance" class="page">
        <h2 style="text-align: center; font-weight: 200; letter-spacing: 3px;">БАЛАНС</h2>
        <div class="info-card" style="text-align: center; padding: 50px 0; border-style: dashed;">
            <div style="font-size: 42px; font-weight: 700; color: var(--accent-color);">0.00 ₽</div>
            <div class="info-label">Доступно к выводу</div>
        </div>
        <button class="action-btn primary" style="margin-top: 25px;">Вывести средства</button>
    </div>

    <div id="page-profile" class="page">
        <h2 style="text-align: center; font-weight: 200; letter-spacing: 3px;">ПРОФИЛЬ</h2>
        <div class="info-card" style="margin-bottom: 15px;">
            <div style="display: flex; justify-content: space-between; margin-bottom: 12px;">
                <span class="info-label">Ваш ID</span><span id="user-id" style="font-family: monospace;">...</span>
            </div>
            <div style="display: flex; justify-content: space-between;">
                <span class="info-label">Статус</span><span style="color: var(--accent-color); font-weight: 700;">PREMIUM</span>
            </div>
        </div>
    </div>

    <div id="page-game" class="page">
        <h2 style="text-align: center; font-weight: 200; letter-spacing: 3px;">SVOY GAME</h2>
        <div class="info-card" style="border: 1px solid var(--accent-color); margin-bottom: 15px;">
            <div id="stairs">
                <div id="stair-man-container" style="position: absolute; bottom: 0; left: 0; transition: 0.8s; z-index: 20;">
                    <div class="lego-figure">
                        <div class="lego-head"></div><div class="lego-body">S</div>
                        <div class="lego-limb arm"></div><div class="lego-limb leg"></div>
                    </div>
                </div>
            </div>
        </div>
        <div id="game-container" onclick="jump()">
            <div class="stars"></div><div class="horizon"></div>
            <div id="lego-man-container" style="position: absolute; bottom: 10px; left: 20px;">
                <div id="lego-man-figure" class="lego-figure">
                    <div class="lego-head"></div><div class="lego-body">S</div>
                    <div class="lego-limb arm"></div><div class="lego-limb leg"></div>
                </div>
            </div>
        </div>
        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 20px;">
            <span style="font-size: 24px; font-weight: 700; color: var(--accent-color);"><span id="game-score">0.00</span> ₽</span>
            <button id="startBtn" onclick="startGame()" class="action-btn primary" style="width: auto; padding: 12px 40px; margin-bottom: 0;">ИГРАТЬ</button>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="showPage('home', this)"><span class="nav-icon">🛡</span>Главная</div>
        <div class="nav-item" onclick="showPage('subs', this)"><span class="nav-icon">💎</span>Доступ</div>
        <div class="nav-item" onclick="showPage('balance', this)"><span class="nav-icon">💰</span>Баланс</div>
        <div class="nav-item" onclick="showPage('profile', this)"><span class="nav-icon">👤</span>Профиль</div>
        <div class="nav-item" onclick="showPage('game', this)"><span class="nav-icon">🎮</span>Игра</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const params = new URLSearchParams(window.location.search);
        
        function showPage(pageId, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('page-' + pageId).classList.add('active');
            el.classList.add('active');
            tg.HapticFeedback.impactOccurred('light');
        }

        function toggleConnect() {
            const btn = document.getElementById('powerBtn');
            btn.classList.toggle('active');
            tg.HapticFeedback.notificationOccurred(btn.classList.contains('active') ? 'success' : 'warning');
        }

        const appList = [
            {n:'YT', i:'https://cdn-icons-png.flaticon.com/512/1384/1384060.png'},
            {n:'IG', i:'https://cdn-icons-png.flaticon.com/512/2111/2111463.png'},
            {n:'TG', i:'https://cdn-icons-png.flaticon.com/512/2111/2111646.png'},
            {n:'TK', i:'https://cdn-icons-png.flaticon.com/512/3046/3046121.png'},
            {n:'NF', i:'https://cdn-icons-png.flaticon.com/512/732/732228.png'},
            {n:'SP', i:'https://cdn-icons-png.flaticon.com/512/174/174872.png'},
            {n:'WA', i:'https://cdn-icons-png.flaticon.com/512/733/733585.png'},
            {n:'X', i:'https://cdn-icons-png.flaticon.com/512/5968/5968830.png'},
            {n:'GPT', i:'https://cdn-icons-png.flaticon.com/512/12222/12222588.png'},
            {n:'🎁', i:'https://cdn-icons-png.flaticon.com/512/679/679821.png'}
        ];

        const refs = Math.min(parseInt(params.get('ref')) || 0, 10);
        const stairs = document.getElementById('stairs');
        
        appList.forEach((app, i) => {
            const wrap = document.createElement('div');
            wrap.className = 'app-icon-wrap';
            wrap.style.bottom = (i * 10) + 'px';
            const div = document.createElement('div');
            div.className = `app-icon ${i < refs ? '' : 'locked'}`;
            div.style.backgroundImage = `url('${app.i}')`;
            wrap.appendChild(div);
            stairs.appendChild(wrap);
        });

        setTimeout(() => {
            const man = document.getElementById('stair-man-container');
            const iconsList = document.querySelectorAll('.app-icon');
            const target = iconsList[Math.max(0, refs - 1)];
            man.style.left = target.parentElement.offsetLeft + 'px';
            man.style.bottom = (parseInt(target.parentElement.style.bottom) + 35) + 'px';
        }, 500);

        document.getElementById('user-id').innerText = tg.initDataUnsafe?.user?.id || "12345678";

        // GAME LOGIC
        let isJumping = false;
        function jump() {
            if(isJumping) return;
            isJumping = true;
            const man = document.getElementById('lego-man-container');
            man.style.transition = "bottom 0.3s cubic-bezier(0.4, 0, 0.2, 1)";
            man.style.bottom = "90px";
            tg.HapticFeedback.impactOccurred('medium');
            setTimeout(() => { man.style.bottom = "10px"; setTimeout(() => isJumping = false, 300); }, 300);
        }

        function startGame() {
            document.getElementById('lego-man-figure').classList.add('running');
            document.getElementById('startBtn').style.display = 'none';
        }

        tg.expand();
    </script>
</body>
</html>
