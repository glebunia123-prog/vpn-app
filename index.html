<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SVOY VPN PREMIUM</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --card-bg: #141414;
            --accent-color: #c2a379; 
            --text-main: #e5e5e5;
            --text-gray: #737373;
            --nav-bg: #111111;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0; padding: 0;
            overflow: hidden; user-select: none;
        }

        .page { display: none; padding: 20px; height: calc(100vh - 90px); overflow-y: auto; box-sizing: border-box; }
        .page.active { display: block; }

        /* --- LOGO ANIMATION --- */
        .logo-stage { height: 350px; width: 100%; display: flex; align-items: center; justify-content: center; position: relative; }
        .sand-canvas-svg { width: 360px; height: 150px; overflow: visible; }
        .sand-letter {
            fill: none; stroke: var(--accent-color); stroke-width: 18;
            stroke-linecap: round; stroke-linejoin: round;
            stroke-dasharray: 1000; stroke-dashoffset: 1000;
            animation: drawSandLetter 3s forwards;
        }
        @keyframes drawSandLetter { 0% { stroke-dashoffset: 1000; opacity: 0; } 100% { stroke-dashoffset: 0; opacity: 1; } }

        /* --- BUBBLE BUTTONS WITH PULSE --- */
        .bubble-btn {
            width: 100%; padding: 18px; border-radius: 30px; border: none;
            background: linear-gradient(145deg, #1a1a1a, #141414);
            color: var(--text-main); font-weight: 600; font-size: 14px;
            margin-bottom: 12px; cursor: pointer; box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            transition: 0.3s; display: flex; align-items: center; justify-content: center;
            animation: bubblePulse 4s infinite ease-in-out;
        }
        .bubble-btn.primary { background: var(--accent-color); color: #000; }
        @keyframes bubblePulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.04); } }

        /* --- NAVIGATION (5 BUTTONS) --- */
        .navigation { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; height: 70px; background: var(--nav-bg); border-radius: 35px; display: flex; justify-content: space-around; align-items: center; padding: 0 10px; border: 1px solid rgba(255,255,255,0.05); z-index: 1000; }
        .nav-item { position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 60px; height: 100%; color: var(--text-gray); transition: 0.3s; }
        .nav-item.active { color: var(--accent-color); }
        .nav-item span { font-size: 9px; margin-top: 4px; }
        .nav-indicator { position: absolute; top: 50%; transform: translateY(-50%); width: 50px; height: 50px; background: rgba(194, 163, 121, 0.1); border-radius: 50%; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: -1; }
        .nav-icon-svg { width: 22px; height: 22px; fill: currentColor; }
    </style>
</head>
<body>

    <div id="page-home" class="page active">
        <div class="logo-stage">
            <svg class="sand-canvas-svg" viewBox="0 0 240 100">
                <path class="sand-letter" d="M40,30 c-20,0 -20,20 0,20 s20,20 0,20" />
                <path class="sand-letter" d="M75,30 l15,40 l15,-40" />
                <path class="sand-letter" d="M130,50 a15,20 0 1,0 30,0 a15,20 0 1,0 -30,0" />
                <path class="sand-letter" d="M185,30 l15,20 l15,-20 M200,50 l0,20" />
            </svg>
        </div>

        <div class="info-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px;">
            <div style="background: var(--card-bg); padding: 18px; border-radius: 20px; border: 1px solid #262626;">
                <div style="font-size: 10px; color: var(--text-gray); text-transform: uppercase;">Подписка до</div>
                <div style="font-size: 14px; font-weight: 600;">12.06.2026</div>
            </div>
            <div style="background: var(--card-bg); padding: 18px; border-radius: 20px; border: 1px solid #262626;">
                <div style="font-size: 10px; color: var(--text-gray); text-transform: uppercase;">Устройств</div>
                <div style="font-size: 14px; font-weight: 600;">1 / 3</div>
            </div>
        </div>

        <button class="bubble-btn primary">Продлить доступ</button>
        <button class="bubble-btn">Подключить устройство</button>
    </div>

    <!-- Другие страницы (Balance, Profile и т.д.) -->
    <div id="page-balance" class="page">
        <h2 style="text-align: center; letter-spacing: 3px;">БАЛАНС</h2>
        <div style="background: var(--card-bg); padding: 50px 0; border-radius: 20px; border: 1px solid #262626; text-align: center;">
            <div id="balance-amount" style="font-size: 42px; font-weight: 700; color: var(--accent-color);">0.00 ₽</div>
            <div style="font-size: 10px; color: var(--text-gray); text-transform: uppercase;">Доступно к выводу</div>
        </div>
    </div>

    <div class="navigation">
        <div class="nav-indicator" id="navIndicator"></div>
        <div class="nav-item active" onclick="showPage('home', this, 0)">
            <svg class="nav-icon-svg" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            <span>Главная</span>
        </div>
        <div class="nav-item" onclick="showPage('subs', this, 1)">
            <svg class="nav-icon-svg" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/></svg>
            <span>Подписка</span>
        </div>
        <div class="nav-item" onclick="showPage('balance', this, 2)">
            <svg class="nav-icon-svg" viewBox="0 0 24 24"><path d="M21 18v1c0 1.1-.9 2-2 2H5c-1.1 0-2-.9-2-2V5c0-1.1.9-2 2-2h14c1.1 0 2 .9 2 2v1h-9c-1.1 0-2 .9-2 2v8c0 1.1.9 2 2 2h9z"/></svg>
            <span>Баланс</span>
        </div>
        <div class="nav-item" onclick="showPage('profile', this, 3)">
            <svg class="nav-icon-svg" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
            <span>Профиль</span>
        </div>
        <div class="nav-item" onclick="showPage('game', this, 4)">
            <svg class="nav-icon-svg" viewBox="0 0 24 24"><path d="M21 6H3c-1.1 0-2 .9-2 2v8c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2z"/></svg>
            <span>Игра</span>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        function showPage(pageId, el, index) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            const target = document.getElementById('page-' + pageId);
            if(target) target.classList.add('active');
            el.classList.add('active');
            
            const nav = document.querySelector('.navigation');
            const step = (nav.offsetWidth - 20) / 5;
            document.getElementById('navIndicator').style.left = (10 + (step * index) + (step/2 - 25)) + 'px';
            tg.HapticFeedback.impactOccurred('light');
        }
        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            const balance = (parseInt(params.get('ref')) || 0) * 40;
            document.getElementById('balance-amount').innerText = balance + '.00 ₽';
            showPage('home', document.querySelector('.nav-item'), 0);
        };
        tg.expand();
    </script>
</body>
</html>
